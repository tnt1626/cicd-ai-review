name: GitHub Actions CI Workflow

on:
  push:
    branches: 
        - main
  pull_request:
    branches: 
        - main

permissions:
  pull-requests: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        
    steps:
      - name: Checks-out your repository 
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python 
        uses: actions/setup-python@v5
        with:
            python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Run tests
        run: uv run pytest

  build:
    needs: test

    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with: 
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ vars.DOCKER_HUB_USERNAME }}/cicd-app:latest

  deploy:
    needs: build

    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Sign in and push to VM instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: gcp-deploy
          key: ${{ secrets.VPS_KEY }}
          script: |
            docker pull ${{ vars.DOCKER_HUB_USERNAME }}/cicd-app:latest
            docker stop app || true
            docker rm app || true 
            docker run -d --name app -p 8000:8000 \
              ${{ vars.DOCKER_HUB_USERNAME }}/cicd-app:latest

  ai-reviews:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate diff
        run: git diff origin/main...HEAD > text/diff.txt

      - name: Run AI review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV: prod
        run: |
          uv run -m src.review \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }}