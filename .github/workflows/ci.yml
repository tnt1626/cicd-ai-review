# Name of this action
name: GitHub Actions CI Workflow

# Triggers
on:
  push:
    branches: 
        - main
  pull_request:
    branches: 
        - main

jobs:
  build:
    runs-on: ubuntu-latest
        
    steps:
      # Checks-out your repository 
      - uses: actions/checkout@v4

      # Install uv
      - uses: astral-sh/setup-uv@v6

      # Setup Python 3.13
      - uses: actions/setup-python@v5
        with:
            python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Run tests
        run: uv run pytest

